<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: macOS-style rounded square -->
  <rect width="1024" height="1024" rx="228" fill="#1a1a1a"/>
  
  <!-- Pen nib silhouette (white) - centered, pointing down -->
  <g transform="translate(512, 490)">
    <!-- Main nib body: elongated shape with pronounced shoulders -->
    <path d="
      M 0 -310
      C 40 -310, 200 -220, 210 -120
      C 218 -50, 185 60, 28 310
      L 0 350
      L -28 310
      C -185 60, -218 -50, -210 -120
      C -200 -220, -40 -310, 0 -310
      Z
    " fill="#ffffff"/>
    
    <!-- Breather hole (cutout) -->
    <circle cx="0" cy="-130" r="34" fill="#1a1a1a"/>
    
    <!-- Central slit (cutout) - from below breather hole to near tip -->
    <rect x="-5.5" y="-96" width="11" height="410" rx="5.5" fill="#1a1a1a"/>
  </g>
</svg>
