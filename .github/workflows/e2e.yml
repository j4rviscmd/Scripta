name: E2E Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Tests
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            e2e-tests/package-lock.json

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Install E2E test dependencies
        working-directory: e2e-tests
        run: npm ci

      - name: Install tauri-webdriver
        run: cargo install tauri-webdriver --locked

      - name: Build Tauri app (debug)
        working-directory: src-tauri
        run: cargo build

      - name: Run E2E tests
        working-directory: e2e-tests
        run: |
          npx wdio run wdio.conf.ts \
            --spec test/app-launch.e2e.ts \
            --spec test/editor-commands.e2e.ts

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: e2e-tests/screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Comment screenshots on PR
        if: >-
          always()
          && github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const screenshotDir = 'e2e-tests/screenshots';
            const marker = '<!-- e2e-screenshots-comment -->';
            const prNumber = context.issue.number;
            const branch = 'ci-screenshots';
            const dir = `pr-${prNumber}`;

            function findPngs(d) {
              if (!fs.existsSync(d)) return [];
              const results = [];
              for (const entry of fs.readdirSync(d, { withFileTypes: true })) {
                const fullPath = path.join(d, entry.name);
                if (entry.isDirectory()) results.push(...findPngs(fullPath));
                else if (entry.name.endsWith('.png')) results.push(fullPath);
              }
              return results;
            }

            const pngs = findPngs(screenshotDir);

            // Upload screenshots to ci-screenshots branch for inline display
            if (pngs.length > 0) {
              const blobs = await Promise.all(pngs.map(async (png) => {
                const content = fs.readFileSync(png).toString('base64');
                const { data } = await github.rest.git.createBlob({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  content,
                  encoding: 'base64',
                });
                return {
                  path: `${dir}/${path.relative(screenshotDir, png)}`,
                  sha: data.sha,
                };
              }));

              let parentSha = null;
              try {
                const { data: ref } = await github.rest.git.getRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branch}`,
                });
                parentSha = ref.object.sha;
              } catch {
                // Branch doesn't exist yet
              }

              const treeItems = blobs.map(b => ({
                path: b.path,
                mode: '100644',
                type: 'blob',
                sha: b.sha,
              }));

              let baseTree;
              if (parentSha) {
                const { data: parentCommit } = await github.rest.git.getCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: parentSha,
                });
                baseTree = parentCommit.tree.sha;
              }

              const { data: tree } = await github.rest.git.createTree({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tree: treeItems,
                ...(baseTree ? { base_tree: baseTree } : {}),
              });

              const { data: commit } = await github.rest.git.createCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                message: `ci: upload E2E screenshots for PR #${prNumber}`,
                tree: tree.sha,
                parents: parentSha ? [parentSha] : [],
              });

              if (parentSha) {
                await github.rest.git.updateRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branch}`,
                  sha: commit.sha,
                });
              } else {
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/heads/${branch}`,
                  sha: commit.sha,
                });
              }
            }

            // Build comment body with inline images
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const conclusion = '${{ job.status }}';
            const icon = conclusion === 'success' ? '✅' : '❌';

            let body = `${marker}\n`;
            body += `## 📸 E2E Test Screenshots\n\n`;
            body += `**Status**: ${icon} ${conclusion}\n`;
            body += `**Run**: [#${context.runNumber}](${runUrl})\n\n`;

            if (pngs.length === 0) {
              body += `No screenshots were captured.\n`;
            } else {
              body += `<details>\n<summary>${pngs.length} screenshot(s) captured (click to expand)</summary>\n\n`;
              pngs.forEach((png, i) => {
                const rel = path.relative(screenshotDir, png);
                const imageUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${branch}/${dir}/${rel}`;
                body += `### ${i + 1}. \`${rel}\`\n`;
                body += `![${rel}](${imageUrl})\n\n`;
              });
              body += `</details>\n`;
            }

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
