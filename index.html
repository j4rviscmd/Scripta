<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scripta</title>
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Workaround for https://github.com/ueberdosis/tiptap/issues/5450
      // Must run before Vite pre-bundled chunks capture console.warn
      (() => {
        const _warn = console.warn;
        console.warn = (...args) => {
          const msg = typeof args[0] === "string" ? args[0] : "";
          if (msg.startsWith("linkifyjs: already initialized")) return;
          _warn.apply(console, args);
        };
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
