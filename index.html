<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Scripta/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scripta — A beautifully simple note app</title>
    <meta name="description" content="Scripta is a free, offline-first desktop note app for macOS and Windows. No accounts, no cloud, no subscriptions — just your notes." />
    <!-- Anti-FOUC: apply dark class before React mounts -->
    <script>
      (function () {
        try {
          const theme = localStorage.getItem('scripta-theme')
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
          }
        } catch (_) {}
      })()
    </script>

  </body>
